<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Marquee</title>
<style>
  /* ── Theme tokens ─────────────────────────────────────────────── */
  :root {
    --bg: #0B0D10; --panel: #14171C; --line: #262B33;
    --text: #F2EEE6; --text-soft: #C7CBD1; --muted: #9AA1AB; --faint: #8A919C;
    --accent: #E5A83B; --accent-glow: rgba(229, 168, 59, .16);
    --chip-border: #3A414C; --track: #262B33; --pause: #6B7280;
    --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --radius: 1.4vw;
  }
  :root[data-theme="ice"] {
    --bg: #0A0E14; --accent: #7FB8E8; --accent-glow: rgba(127, 184, 232, .16); }
  :root[data-theme="crimson"] {
    --bg: #100B0D; --accent: #E85454; --accent-glow: rgba(232, 84, 84, .16); }
  :root[data-theme="emerald"] {
    --bg: #0A100D; --accent: #5BC98F; --accent-glow: rgba(91, 201, 143, .16); }

  html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden;
    font-family: var(--font); -webkit-font-smoothing: antialiased; }

  .bg { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover;
    opacity: 0; transition: opacity 1s ease; }
  .bg.on { opacity: .22; }
  .bg-shade { position: fixed; inset: 0; background:
    linear-gradient(90deg, var(--bg) 8%, transparent 130%); opacity: .92; }
  body.flip .bg-shade { transform: scaleX(-1); }

  /* ── Blocks: each is a self-contained, internally designed group ─ */
  .stage { position: fixed; inset: 0; display: grid; box-sizing: border-box;
    padding: 6vh 5vw; column-gap: 4vw; row-gap: 0;
    opacity: 1; transition: opacity .5s ease; }
  .stage.fade { opacity: 0; }
  .stage.hidden { display: none; }
  .block { min-width: 0; position: relative; padding: 1.2vh 0; }
  .block[hidden] { display: none !important; }
  .b-clock    { grid-area: clock; }
  .b-identity { grid-area: identity; display: grid; row-gap: 1.6vh; justify-items: start; }
  .b-meta     { grid-area: meta; }
  .b-plot     { grid-area: plot; }
  .b-ratings  { grid-area: ratings; }
  .b-progress { grid-area: progress; }
  .b-poster   { grid-area: poster; }
  .b-identity > * { margin: 0; }

  .clock { color: var(--faint); font-size: 2vw; font-weight: 600;
    font-variant-numeric: tabular-nums; }
  .clock:empty { display: none; }

  .logo { max-height: 22vh; max-width: 42vw; object-fit: contain; display: none;
    filter: drop-shadow(0 .6vh 2vh rgba(0,0,0,.8)); }
  .has-logo .logo { display: block; }
  .has-logo .title { display: none; }

  .eyebrow { color: var(--accent); font-size: 1.5vw; font-weight: 600;
    letter-spacing: .32em; text-transform: uppercase; }
  .title { color: var(--text); font-size: 5.2vw; font-weight: 800; line-height: 1.05;
    letter-spacing: -0.015em;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .subtitle { color: var(--muted); font-size: 2.2vw; font-weight: 500; }
  .subtitle:empty { display: none; }
  .eyebrow:empty { display: none; }

  .meta { color: var(--muted); font-size: 1.8vw; font-weight: 500;
    display: flex; align-items: center; gap: 1.4vw; flex-wrap: wrap; }
  .chip { border: 2px solid var(--chip-border); border-radius: .5vw; padding: .2vh .7vw;
    font-size: 1.4vw; font-weight: 700; color: var(--text-soft); letter-spacing: .06em; }
  .chip.stinger { border-color: var(--accent); color: var(--accent);
    text-transform: uppercase; letter-spacing: .18em; font-size: 1.15vw; }

  .rbadge.mpaa { background: #F4F4F0; color: #111; border: .22vw solid #111;
    border-radius: .4vw; padding: .3vh .8vw; font-weight: 900; font-size: 1.6vw;
    letter-spacing: .02em; }
  .rbadge.tv { background: #E8E8E4; color: #111; border-radius: .35vw;
    display: inline-flex; flex-direction: column; align-items: center;
    line-height: 1; padding: .5vh .7vw; }
  .rbadge.tv i { font-style: normal; font-size: .85vw; font-weight: 800;
    letter-spacing: .18em; }
  .rbadge.tv b { font-size: 1.7vw; font-weight: 900; margin-top: .3vh; }

  .plot { margin: 0; color: var(--text-soft); font-size: 1.9vw; line-height: 1.5;
    max-width: 48ch;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

  .scores { display: flex; align-items: center; gap: 3.4vw; }
  .score { display: flex; align-items: center; gap: .9vw; }
  .score svg { width: 3.4vw; height: 3.4vw; }
  .score .num { color: var(--text); font-size: 3vw; font-weight: 800;
    font-variant-numeric: tabular-nums; line-height: 1; }
  .imdb-tag { background: #F5C518; color: #111; font-weight: 800;
    font-size: 1.5vw; padding: .5vh .8vw; border-radius: .5vw; }

  .b-progress { width: 42vw; }
  .bar { height: .9vh; background: var(--track); border-radius: 1vh; overflow: hidden; }
  .fill { height: 100%; width: 0; background: var(--accent); border-radius: 1vh;
    transition: width 1s linear; }
  .paused .fill { background: var(--pause); }
  .ptime { display: flex; justify-content: space-between; margin-top: 1.2vh;
    color: var(--faint); font-size: 1.5vw; font-weight: 600;
    font-variant-numeric: tabular-nums; }

  .b-poster { height: 72vh; aspect-ratio: 2 / 3; padding: 0; align-self: center; }
  .b-poster::before { content: ""; position: absolute; inset: -6%;
    background: radial-gradient(closest-side, var(--accent-glow), transparent 75%);
    filter: blur(24px); }
  .poster { position: relative; width: 100%; height: 100%; object-fit: cover;
    border-radius: var(--radius); box-shadow: 0 2.5vh 7vh rgba(0,0,0,.65);
    background: var(--panel); }

  /* ── Template: Spotlight — poster beside the full metadata stack ─ */
  body[data-template="spotlight"] .stage {
    grid-template-columns: 1fr auto; align-content: center;
    grid-template-areas: "identity poster" "meta poster" "plot poster"
                         "ratings poster" "progress poster"; }
  body.flip[data-template="spotlight"] .stage {
    grid-template-columns: auto 1fr;
    grid-template-areas: "poster identity" "poster meta" "poster plot"
                         "poster ratings" "poster progress"; }
  body[data-template="spotlight"] .b-clock,
  body[data-template="split"] .b-clock,
  body[data-template="hero"] .b-clock,
  body[data-template="lowerthird"] .b-clock {
    position: absolute; top: 3.5vh; right: 5vw; padding: 0; z-index: 2; }

  /* ── Template: Split — hard 50/45 divide, art wall + info column ─ */
  body[data-template="split"] .stage { padding: 0; column-gap: 0;
    grid-template-columns: 45fr 55fr;
    grid-template-rows: 1fr repeat(5, auto) 1fr;
    grid-template-areas: "poster ." "poster identity" "poster meta" "poster plot"
                         "poster ratings" "poster progress" "poster ."; }
  body.flip[data-template="split"] .stage {
    grid-template-columns: 55fr 45fr;
    grid-template-areas: ". poster" "identity poster" "meta poster" "plot poster"
                         "ratings poster" "progress poster" ". poster"; }
  body[data-template="split"] .b-poster { height: 100%; aspect-ratio: auto;
    align-self: stretch; }
  body[data-template="split"] .b-poster::before { display: none; }
  body[data-template="split"] .b-poster::after { content: ""; position: absolute;
    top: 0; bottom: 0; right: 0; width: .28vw; background: var(--accent); }
  body.flip[data-template="split"] .b-poster::after { right: auto; left: 0; }
  body[data-template="split"] .poster { border-radius: 0; box-shadow: none; }
  body[data-template="split"] .b-identity, body[data-template="split"] .b-meta,
  body[data-template="split"] .b-plot, body[data-template="split"] .b-ratings,
  body[data-template="split"] .b-progress { margin: 0 5vw; }
  body[data-template="split"] .title { font-size: 4.6vw; }
  body[data-template="split"] .bg.on { opacity: .14; }

  /* ── Template: Hero — big centered marquee over the backdrop ───── */
  body[data-template="hero"] .stage { grid-template-columns: 1fr;
    grid-template-rows: 1fr auto auto auto 1fr auto;
    grid-template-areas: "." "identity" "meta" "ratings" "." "progress";
    justify-items: center; text-align: center; }
  body[data-template="hero"] .b-identity { justify-items: center; row-gap: 2.2vh; }
  body[data-template="hero"] .b-plot, body[data-template="hero"] .b-poster { display: none; }
  body[data-template="hero"] .logo { max-height: 32vh; max-width: 56vw; }
  body[data-template="hero"] .title { font-size: 7vw; }
  body[data-template="hero"] .subtitle { font-size: 2.5vw; }
  body[data-template="hero"] .meta { justify-content: center; font-size: 2vw; }
  body[data-template="hero"] .b-progress { width: 50vw; }
  body[data-template="hero"] .bg.on { opacity: .34; }
  body[data-template="hero"] .bg-shade { background:
    radial-gradient(ellipse at center, transparent 20%, var(--bg) 115%); }

  /* ── Template: Lower Third — chyron bar over full-bleed art ────── */
  body[data-template="lowerthird"] .stage { padding: 0;
    grid-template-columns: 1fr auto;
    grid-template-rows: 1fr auto auto auto;
    grid-template-areas: ". ." "identity ratings" "meta ratings" "progress progress"; }
  body[data-template="lowerthird"] .stage::before { content: ""; position: absolute;
    left: 0; right: 0; bottom: 0; height: 44vh; pointer-events: none;
    background: linear-gradient(transparent, rgba(4, 5, 7, .88) 62%); }
  body[data-template="lowerthird"] .b-plot, body[data-template="lowerthird"] .b-poster { display: none; }
  body[data-template="lowerthird"] .b-identity { margin-left: 5vw; row-gap: .8vh; }
  body[data-template="lowerthird"] .b-meta { margin-left: 5vw; }
  body[data-template="lowerthird"] .b-ratings { margin-right: 5vw; align-self: end; }
  body[data-template="lowerthird"] .b-progress { width: auto; margin: 1.2vh 5vw 3.5vh; }
  body[data-template="lowerthird"] .logo { max-height: 13vh; max-width: 30vw; }
  body[data-template="lowerthird"] .title { font-size: 3.8vw; -webkit-line-clamp: 1; }
  body[data-template="lowerthird"] .subtitle { font-size: 1.9vw; }
  body[data-template="lowerthird"] .eyebrow { font-size: 1.2vw; }
  body[data-template="lowerthird"] .bg.on { opacity: .55; }
  body[data-template="lowerthird"] .bg-shade { background: none; }

  /* ── Template: Big Clock — ambient timepiece with a now-playing strip ─ */
  body[data-template="bigclock"] .stage { grid-template-columns: 1fr;
    grid-template-rows: 1fr auto auto;
    grid-template-areas: "clock" "identity" "progress";
    justify-items: center; text-align: center; }
  body[data-template="bigclock"] .b-clock { align-self: center; }
  body[data-template="bigclock"] .clock { font-size: 15vw; font-weight: 800;
    color: var(--text); letter-spacing: -.02em;
    text-shadow: 0 1vh 5vh rgba(0,0,0,.6); }
  body[data-template="bigclock"] .b-meta, body[data-template="bigclock"] .b-plot,
  body[data-template="bigclock"] .b-ratings, body[data-template="bigclock"] .b-poster { display: none; }
  body[data-template="bigclock"] .b-identity { justify-items: center; row-gap: .6vh; }
  body[data-template="bigclock"] .logo { max-height: 9vh; max-width: 24vw; }
  body[data-template="bigclock"] .title { font-size: 2.4vw; color: var(--text-soft); }
  body[data-template="bigclock"] .subtitle { font-size: 1.6vw; }
  body[data-template="bigclock"] .eyebrow { display: none; }
  body[data-template="bigclock"] .b-progress { width: 34vw; margin-bottom: 2vh; }
  body[data-template="bigclock"] .bg.on { opacity: .15; }

  .idle { display: none; position: fixed; inset: 0; align-items: center;
    justify-content: center; color: #4A5058; font-size: 1.6vw; font-weight: 500;
    letter-spacing: .3em; text-transform: uppercase; z-index: 2; }
  body.idle .idle { display: flex; }
  body.idle .stage, body.idle .bg, body.idle .bg-shade { display: none; }

  /* The settings preview enables this editor with ?edit=1. */
  body.editing [data-layout] { outline: 2px dashed rgba(229,168,59,.7);
    outline-offset: 5px; cursor: move; touch-action: none; }
  body.editing [data-layout].selected { outline-style: solid; outline-color: var(--accent); }
  body.editing::after { content: ""; position: fixed; inset: 0; z-index: 20;
    pointer-events: none; background-image:
    linear-gradient(rgba(229,168,59,.13) 1px, transparent 1px),
    linear-gradient(90deg, rgba(229,168,59,.13) 1px, transparent 1px);
    background-size: 2.5vw 2.5vh; }

  @media (prefers-reduced-motion: reduce) { .stage, .fill, .bg { transition: none; } }
</style>
<body data-template="spotlight">
<img class="bg" id="bg" alt="">
<div class="bg-shade"></div>
<div class="stage hidden">
  <div class="block b-clock" data-layout="clock"><div class="clock" id="clock"></div></div>
  <div class="block b-identity" data-layout="identity">
    <p class="eyebrow" id="eyebrow"></p>
    <img class="logo" id="logo" alt="">
    <h1 class="title" id="title"></h1>
    <p class="subtitle" id="subtitle"></p>
  </div>
  <div class="block b-meta" data-layout="meta"><div class="meta" id="meta"></div></div>
  <div class="block b-plot" data-layout="plot"><p class="plot" id="plot"></p></div>
  <div class="block b-ratings" data-layout="ratings"><div class="scores" id="scores"></div></div>
  <div class="block b-progress" data-layout="progress">
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="ptime"><span id="elapsed"></span><span id="remain"></span></div>
  </div>
  <div class="block b-poster" data-layout="poster"><img class="poster" id="poster" alt=""></div>
</div>
<p class="idle">Nothing playing</p>

    const layout = activeCfg().blockLayout || {};
    document.querySelectorAll('[data-layout]').forEach(el => {
      const p = layout[el.dataset.layout] || {};
      el.style.transform =
        `translate(${p.x || 0}vw, ${p.y || 0}vh) scale(${p.scale || 1})`;
      el.style.width = p.width ? p.width + 'vw' : '';
    });
  }

  function selectionValues(el, name) {
    const p = (draftLayout || activeCfg().blockLayout || {})[name] || {};
    const rect = el.getBoundingClientRect();
    return { x: p.x || 0, y: p.y || 0,
      width: p.width || Math.round(rect.width / innerWidth * 100),
      scale: p.scale || 1 };
  }

  function announceSelection(el, name) {
    parent.postMessage({ type: 'marquee-selection', name,
      values: selectionValues(el, name) }, location.origin);
  }

  function enableEditor() {
    if (!EDIT) return;
    document.body.classList.add('editing');
    document.querySelectorAll('[data-layout]').forEach(el => {
      el.addEventListener('pointerdown', event => {
        event.preventDefault(); event.stopPropagation();
        document.querySelectorAll('[data-layout]').forEach(n => n.classList.remove('selected'));
        el.classList.add('selected');
        const name = el.dataset.layout;
        const layout = draftLayout ||= structuredClone(activeCfg().blockLayout || {});
        selectedLayout = name;
        announceSelection(el, name);
        const p = layout[name] ||= {};
        const start = { x: event.clientX, y: event.clientY, px: p.x || 0, py: p.y || 0 };
        el.setPointerCapture(event.pointerId);
        const snap = v => Math.round(v);
        const move = e => {
          p.x = Math.max(-100, Math.min(100,
            snap(start.px + (e.clientX - start.x) / innerWidth * 100)));
          p.y = Math.max(-100, Math.min(100,
            snap(start.py + (e.clientY - start.y) / innerHeight * 100)));
          applyBlockLayout();
        };
        const up = () => {
          el.removeEventListener('pointermove', move); el.removeEventListener('pointerup', up);
          parent.postMessage({ type: 'marquee-layout', layout }, location.origin);
          announceSelection(el, name);
        };
        el.addEventListener('pointermove', move); el.addEventListener('pointerup', up);
      });
    });
  }

  window.addEventListener('message', event => {
    if (!EDIT || event.origin !== location.origin) return;
    const msg = event.data || {};
    if (msg.type === 'marquee-cfg') {
      draftCfg = msg.cfg || {};
      if (lastD) render(lastD), paint();
    } else if (msg.type === 'marquee-layout-preview') {
      draftLayout = structuredClone(msg.layout || {});
      applyBlockLayout();
    } else if (msg.type === 'marquee-select') {
      const el = document.querySelector(`[data-layout="${msg.name}"]`);
      if (!el) return;
      selectedLayout = msg.name;
      document.querySelectorAll('[data-layout]').forEach(n => n.classList.remove('selected'));
      el.classList.add('selected');
      announceSelection(el, selectedLayout);
    } else if (msg.type === 'marquee-set') {
      const el = document.querySelector(`[data-layout="${selectedLayout}"]`);
      if (!el || !['x', 'y', 'width', 'scale'].includes(msg.field)) return;
      const layout = draftLayout ||= structuredClone(activeCfg().blockLayout || {});
      const p = layout[selectedLayout] ||= selectionValues(el, selectedLayout);
      p[msg.field] = Number(msg.value);
      applyBlockLayout();
      parent.postMessage({ type: 'marquee-layout', layout }, location.origin);
      announceSelection(el, selectedLayout);
    }
  });

  function refreshPoster(d) {
    const i = new Image();
    i.onload = () => { $('poster').src = i.src; };
    i.src = DEMO ? DEMO_POSTER : '/poster.jpg?k=' + d.key;
  }

  function paint() {
    const c = activeCfg();
    const opts = { hour: 'numeric', minute: '2-digit', hour12: c.clockFormat !== '24h' };
    if (c.clockSeconds) opts.second = '2-digit';
    $('clock').textContent = (c.showClock === false || document.body.classList.contains('idle'))
      ? '' : new Date().toLocaleTimeString([], opts);
    if (!prog || c.showProgress === false) return;
    const off = Math.min(
      prog.offsetMs + (state === 'playing' ? Date.now() - fetchedAt : 0),
      prog.durationMs);
    $('fill').style.width = (off / prog.durationMs * 100).toFixed(2) + '%';
    $('elapsed').textContent = fmt(off);
    $('remain').textContent = state === 'paused'
      ? 'Paused' : fmt(prog.durationMs - off) + ' left';
    document.querySelector('.b-progress').classList.toggle('paused', state === 'paused');
  }

  async function tick() {
    let d = DEMO_DATA;
    try {
      baseCfg = await (await fetch('/settings.json?t=' + Date.now())).json();
      if (!DEMO) d = await (await fetch('/now-playing.json?t=' + Date.now())).json();
    } catch (e) { if (!DEMO) return; }
    if (!d.playing) { document.body.classList.add('idle'); shownKey = null; prog = null; return; }
    document.body.classList.remove('idle');
    stage.classList.remove('hidden');
    prog = d.progress || null; state = d.state || 'playing'; fetchedAt = Date.now();
    const key = (d.title || '') + '|' + (d.subtitle || '');
    if (key !== shownKey) {
      stage.classList.add('fade');
      setTimeout(() => { render(d); refreshPoster(d); stage.classList.remove('fade'); }, 500);
      shownKey = key;
    } else {
      render(d);
      refreshPoster(d);
    }
    paint();
  }

  enableEditor();
  tick();
  setInterval(tick, 5000);
  setInterval(paint, 1000);
</script>
